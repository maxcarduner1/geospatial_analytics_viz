bundle:
  name: geospatial-analytics-viz

variables:
  catalog:
    default: cmegdemos_catalog
  schema:
    default: geospatial_analytics
  warehouse_id:
    default: 9cd919d96b11bf1c
  app_name:
    default: geospatial-signal-quality
  app_dir:
    default: /Workspace/Users/max.carduner@databricks.com/geospatial-signal-quality-app
  agent_app_name:
    default: signal-quality-agent
  agent_app_dir:
    default: /Workspace/Users/max.carduner@databricks.com/signal-quality-agent-app
  genie_space_title:
    default: "Geospatial — Chandler Fashion Center Signal Analysis"
  genie_space_description:
    default: "Live spatial queries on T-Mobile cell signal readings at Chandler Fashion Center using Databricks ST_* functions."
  genie_parent_path:
    default: /Shared
  genie_space_id:
    default: "01f12b9111a1125faf602bfbd14baf35"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-cmegdemos.cloud.databricks.com
      profile: fevm-cmegdemos

  prod:
    mode: production
    workspace:
      host: https://fevm-cmegdemos.cloud.databricks.com
      profile: fevm-cmegdemos
      root_path: /Users/max.carduner@databricks.com/.bundle/${bundle.name}/prod

resources:
  jobs:
    geospatial_analysis_job:
      name: "[Geospatial] Chandler Fashion Center Signal Analysis"
      description: "Loads signal points + building polygons, runs ST intersection, persists tables for Genie"
      tags:
        team: tmo
        domain: geospatial

      environments:
        - environment_key: serverless
          spec:
            client: "5"
            dependencies:
              - geopandas>=1.0.0

      tasks:
        - task_key: setup_tables
          description: "Persist raw signal points and building polygons as managed Delta tables"
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/01_setup_tables.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"

        - task_key: run_h3_analysis
          description: "H3-indexed spatial join — tessellates polygons, joins via H3 cell, refines with ST_Contains"
          depends_on:
            - task_key: setup_tables
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/02a_h3_analysis.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              h3_resolution: "9"

        - task_key: run_analysis
          description: "ST intersection + signal quality analysis, persists intersected_signal_points"
          depends_on:
            - task_key: setup_tables
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/02_analysis.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              warehouse_id: "${var.warehouse_id}"

        - task_key: build_app
          description: "Generate Dash app files, create Databricks App, grant permissions, deploy"
          depends_on:
            - task_key: run_analysis
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/03_build_app.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              warehouse_id: "${var.warehouse_id}"
              app_name: "${var.app_name}"
              app_dir: "${var.app_dir}"
              agent_app_name: "${var.agent_app_name}"
              agent_app_dir: "${var.agent_app_dir}"

        - task_key: create_genie_space
          description: "Create or update Genie AI/BI space with all 3 geospatial tables and ST function instructions"
          depends_on:
            - task_key: run_analysis
          environment_key: serverless
          notebook_task:
            notebook_path: ./notebooks/04_create_genie_space.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              warehouse_id: "${var.warehouse_id}"
              space_title: "${var.genie_space_title}"
              space_description: "${var.genie_space_description}"
              parent_path: "${var.genie_parent_path}"
              genie_space_id: "${var.genie_space_id}"
